---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
          - os: windows-latest
            runtime: win-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3.2.1
        with:
          versionSpec: '6.3.x'

      # Optionally, setup GitVersion to get semver from git tags
      - name: Get Git Version
        uses: gittools/actions/gitversion/execute@v0.9.12
        id: gitversion

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src

      - name: Build with version info
        run: dotnet build src --configuration Release /p:Version=${{ steps.gitversion.outputs.semVer }}

      - name: Run tests
        run: dotnet test src --no-build --verbosity normal

      - name: Publish self-contained executable
        run: |
          dotnet publish src/AzReposClient.Cli/AzReposClient.Cli.csproj \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            /p:Version=${{ steps.gitversion.outputs.semVer }} \
            -o ./publish/${{ matrix.runtime }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AzRepos-cli-${{ steps.gitversion.outputs.semVer }}-${{ matrix.runtime }}
          path: ./publish/${{ matrix.runtime }}

  release:
    needs: build-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Download Linux artifact
      uses: actions/download-artifact@v3
      with:
        name: AzRepos-cli-${{ steps.gitversion.outputs.semVer }}-linux-x64
        path: ./artifacts/linux

    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: AzRepos-cli-${{ steps.gitversion.outputs.semVer }}-win-x64
        path: ./artifacts/windows

    - name: Upload Linux release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/linux/AzRepos.CLI.exe
        asset_name: AzRepos.CLI-${{ github.ref_name }}-linux-x64.exe
        asset_content_type: application/octet-stream

    - name: Upload Windows release asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./artifacts/windows/AzRepos.CLI.exe
        asset_name: AzRepos.CLI-${{ github.ref_name }}-win-x64.exe
        asset_content_type: application/octet-stream
